services:
  - type: web
    name: aurabasebd-reseller
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && BASE_PATH=/__mockup pnpm --filter @workspace/mockup-sandbox run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aurabasebd-db
          property: connectionString

databases:
  - name: aurabasebd-db
    region: oregon
    plan: free
    databaseName: aurabasebd
    user: aurabasebd
